body:
  text: 馬王堆漢墓帛書老子甲本卷後古佚書明君臣以明君者必有實矣明君之實奚若才曰小則能為大弱則能為強而能自尊也此明君之實也曰君奚得而尊曰戰勝則君尊功取地地者務在功戰而止矣是以賢士明君知其存功戰也故輿邦積於兵豚天世而冣材士不多用於无功以厚賞慶不積藏於无益之器以利備用冣天下之良而獨有之故能乏強強則制天下是故善戰者其城不圍善守者其地不亡守戰邦之大務也而賢君獨積焉故无適當試近比之今操百洫之璧以居中野內非有孟賁之勇也外非有弓有之備也其所以侑之者有非如慶忌之材也以為不過盗必奪之矣今夫萬家之眾百里之地此其為璧多矣已而人主非有守禦戰鬭之勝李也以為軨適必危之矣故利俞大而天下之欲之也愉甚夫先王一人而有天下諸侯之欲之者而先王不失其天下以夫先王之守取天下固與世異李矣先王之所以異者何也以夫先王者為侖蚤𢔴之士材巽海內之眾簡令天下之材瑣焉其所以實邦哀軍者皆一之人也夫故以氏功戰天下弗敢塞以氏守禦天下弗敢試也天故遷天子之乏臣諸侯之君天下之請也不得已於其有勝李也今其所以實邦充軍者非勝適者也已而曰我佁服軨皆巫祝之言也以虛卷言之者也臣以賢士之請為不以虛卷言賢之所以王公者身𥽦行以萬民襲賢上可以之稿巽𣳠內之眾以為兵首釰故曰論材而讎職論功而厚而令行臺室則崇高汙池則廣深其所以飭之者有以丹桼青黃玉此其請美才闌乎先王之目非弗美也已而周何故為葇枯柱曰美氏不若美城裘封營瑩臺華先王非弗美也然而左右之人縵帛之衣疎縠之冠者曰美是不若美兵務敬弓弩脩車馬馳駷也獵射雉虎必勝之主非弗樂也然者曰務氏不若禁暴故詩曰高丘之下必有大埉高臺之下必有深池以為非埉其下也則不能成其高夫故先王地夾人少強功及帝王意以三者為埉輿先王之養鐘鼎壺泔淺而為飭盡為兵用故苑則亶群汙池則盡漁以食戰士夫故當丁壯奮於鬭老弱奮於守三軍之士握鐱者若報父母之叴者盡德其君而利其利也今世主則不然卷馬食叔粟戎馬食苦芉復庾朱襦食良肉戰士食參駟之食係婢衣錦繡戰士衣大布而不完有行此道也而能戰勝守固者未之嘗聞也人君有大務人君之大務何也曰存其所樹積其所樹積者何物也曰弱物也半邦而削盈邦而亡其所樹積強物也半邦而霸盈邦而王臣取於樹強樹強柰何曰毋以非兵者害兵曰兵者所不好也與可罪也戰不勝則不過失夫所不好耳夫所好之積猶可得而有也則何說而必積於兵意夫不勝之為道也不得有夫非兵之積乎有以知其然也昔者齊人與燕人戰於北地齊人不戰北地斷而為燕戰於濟外齊人不勝濟外斷而為天下戰於邦蒿齊人不勝邦不得有其大呂𨝴勞剴直不得有其大呂𨝴勞耳才不得有其王后剴直不得有其王后耳才不得其身故夫不勝之為道也固无得有人之言必勝者胃何才曰使地工𤰿諸侯有職目極色而視之口極味而食之耳極聲而之然則養耳目之樂莫若必勝安邦信志莫若使天下工𤰿諸侯有職此剴弱者此強者此剴夫見制者才此制人者也故勝與不勝如此明也已而大君非壹褚輿邦而積於兵者不得其說夫先王必勝也非剸以為身以為天下也先王將欲廣仁大義以利天下弱者不能非強而君者大君必出䌛於兵故曰明君有廣之有大也也有處也有用也有積也有侍也有也以夫明君之所廣者仁也所大者義也處者誠也所用者良也所積者兵也所寺者時也所者暴也曰廣仁則天下親之大義則天下與之處誠則天下信之用良則天下之積兵則必勝寺時則功大暴則害除而天下利
