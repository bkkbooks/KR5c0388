body:
  text: 馬王堆漢墓帛書老子甲本卷後古佚書德聖四行成善心起四行刑聖氣作五行刑心起和胃之其愛胃之一其要愛胃之天有之者胃之胃子五者一也清濁者之人者清濁之潚身調而神過胃之玄同聖然者然者發𥰃而盈天下者聖天知也知人道曰知知天道曰聖聖者聲也聖者知聖之知知天其事化翟其胃之聖者取諸聲也知天者有聲知其不化知也化而弗知矣化而知之叕也道者者一者天者君子者其閉盈塞胃之德其行胃之道説其賢者備故曰奮然作矣至之者賢者以經經者至率至青何以能為者廣則目為者有匆明焉不可見者以為者手足不用不用焉可以度為者度為者知坐而忘退匆明去知俞己而上同姓者胃所受有厚泊其之善同后為之后之其所受受其有也有也不可以求得也
