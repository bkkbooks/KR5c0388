body:
  text: 馬王堆漢墓帛書老子甲本卷後古佚書五行仁刑於內胃之德之行不刑於內胃之行知刑於內胃之德之行不刑於內胃之行義形於內謂之德之行不形於內謂之行禮刑於內胃之德之行不刑於內胃之行聖刑於內謂之德之行不行於內謂之行德之行五和胃之德四行和胃之善善人道也德天道也君子毋中心之憂則无中心之知无中心之知則无中心之說无中心之說則不安不安則不樂不樂則无德君子无中心之憂則无中心之聖无中心之聖則无中心之說无中心之說則不安不安則不樂不樂則无德五行皆刑於闕內時行之胃之君子士有志於君子道胃之之士善弗為无近得弗之不成知弗思不得思晴不察思不長不得思不輕不刑不刑則不安不安則不樂不樂則无德不仁思不能晴不知思不能長不仁不知未見君子憂心不能能說詩曰未見君子憂心亦既見之亦既鈎之我心則說此之謂也不仁思不能睛不聖思不能輕不仁不聖未見君子憂心既見君子心不仁之思也睛睛則察察則安安則溫溫則則不憂不憂則王色王色則刑刑則仁知之思也長長則得得則不忘不忘則明明則則刑刑則知聖之思也巠巠則刑刑則不忘不忘則悤悤則聞君子道聞君子道則王言王言則則聖尸叴在桑其子七氏叔人君子其宜一氏能為一然后能為君子君子慎其獨也嬰嬰于蜚䦈池其羽之子于歸袁送于野瞻望弗及汲沸如雨能䦈池其羽然后能至袁君子慎其獨也君子之為善也有與始也有與終也君子之為德也有與始也无與終也金聲而玉振之有德者也金聲善也王言聖也善人道也德天道也唯有德者然笱能金聲而玉振之之不不說不說不戚不戚不親不親不愛不愛不仁不直不迣不迣不果不果不簡不簡不行不行不義不袁不敬不敬不嚴不嚴不尊不尊不恭不恭不不不聖不聖不知不知不仁不仁不安不安不樂不樂无德顏色容貌也以其中心與人交說悅也中心說焉遷于兄弟戚也戚而信之親也親而篤之愛也愛父其慈愛人仁也中心辯焉而正行之直也直而也不畏強圉果也而以小道害大道簡也有大罪而大誅之行也貴貴其等尊賢義以其外心與人交袁也袁而之敬也敬而不解嚴嚴而威之尊也尊而不䮦共也共而博交禮也未嘗聞君子道胃之不悤未嘗見賢人胃之不明聞君子道而不知其君子道也胃之不聖見賢人而不知其有德也胃之不知見而知之知也聞而知之聖也明明知也壑壑聖明明在下壑壑在上此之胃也聞君子道悤也聞而知之聖也聖人知而道知而行之聖也行見而知之知也知而安之仁也安而敬之禮也則樂樂則有德有德則國家與詩曰文王在上於昭于天此之謂也見而知之知也知而之仁也安而行之義也行而敬之禮仁義禮知之所䌛生也四行之所和和則同同則善不簡不行不匿不辯於道有大罪而大誅之簡有小罪而赦之匿也有大罪弗誅不行有小罪而弗赦不辯於道簡之為言也猷賀大而罕者匿之為言也猷匿匿小而軫者簡義之方也匿仁之方也剛義之方殹柔仁之方也詩曰不勮不救不剛不柔此之胃也君子雜泰成能進之為君子不能進客止於其里大而罕者能有取焉小而軫者能有取焉索纑纑達於君子道胃之賢君子知而舉之胃之尊賢君子從而事之胃之尊賢前王公之尊賢者也後士之尊賢者也耳目鼻口手足六者心之役也心曰唯莫敢不唯心曰諾莫敢不諾心曰進莫敢不進心曰淺莫敢不淺和則同目而知之胃之進之辟而知之胃之進之諭而知之胃之進之也設曰上帝臨女毋膩爾心此之胃也天生諸其人天也其人施諸人也其人施諸人不得其人不為法聞君子道而說好仁者也聞道而畏好義者也聞道而共好禮者也聞而樂有德者也聖之思也輕思也者思天也輕者尚矣輕則刑刑者刑其所思也酉下子輕思於翟路人如斬酉下子見其如斬也路人如流言其思之刑也刑則不忘不忘者不忘其所也聖之結於心者也不忘則者聖之臧於耳者也猶孔子之聞輕者之鼓而得夏之盧也則聞君子道道者天道也聞君子道之志耳而知之也聞君子道則玉音而美者也聖者聞志耳而知其所以為者也玉音則聖聖尸叴在桑直也其子七也尸叴二子耳曰七也與言也其人者者義也言其所以行之義之一心也能為一然笱能為君子能為一者言能以多為一以多為一也者言能以夫五為一也君子慎其蜀慎其蜀也者言舍夫五而慎其心之胃然笱一一也者夫五夫為心也然笱德之一也乃德已德猶天也天乃德已嬰嬰于䦈貤其羽嬰嬰與也言其相送海也方其化不在其羽矣之子于歸袁送于野詹忘弗及泣涕如雨能䦈貤其羽然笱能至袁言至也䦈貤者言不在嗺絰不在嗺絰也然笱能至哀夫喪正絰脩領而哀殺矣言至內者之不在外也是之胃蜀蜀也者舍𦡊也君子之為善也有與始有與終言與其𦡊始與其𦡊終也君子之為德也有與始无與終有與始者言與其𦡊始无與終者言舍其𦡊而獨其心也金聲䌛德重善也者有事焉者可以剛柔多鉿為故善也者忌有弗為而美者也雖有德者然笱能金聲而玉辰之金聲而玉辰之者動井善於外有德者之不䜌變不說䜌也者𡩄也仁氣也䜌而笱能說不說不慼說而笱能慼所慼不慼不親慼而笱能親之不親不愛親而笱能愛之不愛不仁愛而笱仁䜌者而笱能說仁慼仁親仁愛仁以於親慼亦可不直不迣直也者直其中心也義氣也直而笱能迣迣也者終之者也弗受於眾人受之孟賁未迣也不迣不果果也者言其弗畏也无介於心也不果不間間也者不以小害大不以輕害重不間不行行也者言其所行之義也不袁不敬袁心也者禮氣也質近者弗能敬之袁者動敬心作敬心者也左而右飯之未得敬不敬不嚴嚴猶敬之責者也不嚴不尊嚴而笱忌尊不尊不共共也者敬下也共而笱禮也有以𦡊氣也不不明也者聖之臧於耳者也明也者知之臧於目者也聖之始也明知之始也故曰不明則不聖知聖知必䌛明聖始天知始人聖為崇知為廣不知不仁不知所愛則何愛言仁之乘知而行之不仁不安仁而能安天道也不安不樂安也者言與其𦡊偕安也者也安而笱能樂不樂无德樂也者流𦡊機然忘寒忘寒德之至也樂而笱有䜌䜌變也者𡩄𡩄也孫孫也能行䜌者也能行䜌者心說心然笱顏色容貌溫以說䜌也以其中心與人交說也㝅㝅是說已人無說心也者弗遷於兄弟也遷於兄弟慼也言遷其於兄弟而能相慼也兄弟不相耐者非无所用說心也弗遷於兄弟也慼而信之親也言信其也𢰸而四𦡊予女天下弗為也𢰸如兄弟予女天下弗𢘻也是信之已信其而笱能相親親也而築之愛也築之者厚厚親而笱能相愛也愛父其殺愛人仁也言愛父而笱及人也愛父而殺其鄰子未可胃仁也中心辯焉而正行之直也有天下美飲食於此許䦈而予之中心弗𢘻也惡許䦈而不受許差正行之直直也而遂之迣迣也者遂直者直者也貴迣迣也弗畏強禦果也強禦者勇力者胃之以无介於心果也不以小道害大道間也間也者不以小愛害大愛不以小義害大義也見其生也不食其死也親執株間也有大罪而大誅之行也无罪而殺人有死弗為之矣然而大誅之者知所以誅人之道而焉故胃之行貴貴其等尊賢義也貴貴者貴眾貴也賢賢長長親親爵爵譔貴者无私焉其等尊賢義也尊賢者言等賢者也言譔賢者也言足諸上位此非以其貴也此其義也貴貴而不尊賢未可胃義也以其外心與人交袁也外心者非有它心也同之心也而有胃外心也而有胃中心中心者然者外心者也其𥆞然者也言之心交袁者也袁而莊之敬敬也者嚴嚴也者敬之不解者之責者也是厭之有從而畏忌之則夫間何䌛至乎才是必尊矣尊而不驕恭也言尊而不有已事君與師長者弗胃共矣故斯役人之道共焉共生於尊者恭而博交禮也伯者辯也言其能柏然笱禮也未嘗聞君子之道謂之不同之聞也獨不色然於君子道故胃之不未嘗見賢人胃之不明同之見也獨不色賢人故胃之不明聞君子道而不知其君子道也胃人胃之不聖聞君子道而不色然而不知其天之道也胃之不聖見賢人而不知其有也謂之不知見賢人而不色然不知其所以為之故胃之不知聞而知之聖也聞之而遂知其天之道也聖也見而知之知也見之而遂知其所以為之知也明明知也者䌛所見知所不見也赤赤聖貌也言明明在下赤赤在嘗此之胃也明者始在下赤者始在嘗胃聖知也聞君子道也同之聞也獨色然辯於君子道道者聖之臧於耳者也聞而知之聖也聞之而遂知其天之道也是聖矣聖人知天之道道者所道也知而行之義也知君子之所道而然行之義氣也行之而時也時者和也和也者惠也見賢人明也同之見也獨色然辯於賢人明也明也者知之臧於目者明則見賢人賢人而知之曰何居孰休烝此而遂得之是知也知而安之仁也知君子所道而然安之者仁氣也行而敬之禮也既安之止矣而有秋秋然而敬之者禮氣也天道仁義禮樂所䌛生也言禮樂之生於仁義樂和者有猷五聲之和也樂者言其流𦡊也機然忘寒也忘寒之至也樂而笱有有德而國家與國家與者言天下之與仁義也言其樂也文王在尚於昭于天此之胃也言大備成矣見而知之知也見者也知者言䌛所見知所不見也知而安之仁也知君子所道而然安之者仁氣也安而行之義也既安之矣而然行之義氣也行而敬之禮也既行之矣又秋秋然敬之者禮氣也所安所行所敬人道也仁知禮之所䌛生也言禮智生於仁義也四行之所和言和仁義也和則同和者有猶五聲之和也同者約也與心若一也言舍夫四也而四者同於善心也同善之至也同則善矣人行之大大者人行之然者也世子曰人有恒道達間也間則行矣不匿不辯於道匿者言人行小而軫者也小而實大大之者也世子曰知軫之為軫也斯公然得矣軫者多矣公然者心道也有小罪而赦之匿也有大罪而弗誅不行也有小罪而弗赦不辨於道也間為言猶衡也大而炭者直之也不周四者不辨於道也有大罪而大誅之間匿為言也猶匿匿小而軫者直之也間義之方也匿仁之方也言仁義之用心之所以異也義之盡間也仁之盡匿大加大者大仁加仁小者故義取間而仁取匿詩員不勮不𧧷不剛不柔此之胃也勮者強也𧧷者急也非強之也非急之也非剛之也非柔之也言无所稱焉也此之胃者言仁義之和也君子集大成成也者猶造之也猶具之也大成也者金聲玉辰之也唯金聲而玉振之者然笱忌仁而以人仁忌義而以人義大成至矣神耳矣人以為弗可為䌛至焉耳而不然能誰之為君子弗能進各止於其里能進端能終端則為君子耳矣弗能進各各止於其里不莊尤割人仁之理也不受許䦈者義之理也弗能進也則各止於其里耳矣終其不莊尤割人之心而仁腹四海終其不受許䦈之心而義襄天下仁四海義襄天下而成䌛其中心行之亦君子已大而炭者能有取焉大而炭也者言義也能有取焉也者能行之小而軫者能有取焉小而軫者言仁也能有取焉者也能行之也衡盧盧達於君子道謂之賢衡盧盧也者言其達於君子道也能仁義而遂達於君子道胃之賢也君子知而舉之胃之尊賢君子知而舉之也者猶堯之舉舜之舉伊尹也舉之也者成舉之也知而弗舉未可胃尊賢君子從而士之也者猶顏子子路之士孔子也士之者成士之也知而弗士未可胃尊賢也前王公之尊賢者也後士之尊賢者也直之也耳目鼻口手足六者心之役也耳目也者說聲色者也鼻口者說犫味者也手足者說勶餘者也心也者說仁義者也之數𦡊者皆有說也而六者為心役何也曰心貴也有天下之美聲色於此不義則不聽弗視也有天下之美犫味於此不義則弗求弗食也居而不間尊長者不義則弗為之矣何居曰幾不小不勝大賤不勝貴也才故曰心之役也耳目鼻口手足六者人𦡊之小者也心人人𦡊之大者也故曰君也心曰雖莫敢不雖心曰雖耳目鼻口手足音聲㦝色皆雖是莫敢不雖也若亦然進亦然退亦然心曰深莫敢不深心曰淺莫敢不淺深者甚也淺者不甚也深淺有道矣故父謼口食則堵之手執則投之雖而不若走而不趨是莫敢不深也於兄則不如是其甚也是莫敢不淺也和則同和也者小𦡊䜌䜌然不於心也和於仁義仁義心同者與心若一也約也同於仁仁義心也同則善耳目而知之胃之進之弗目也目則知之矣知之則進耳目之也者比之也天監在下有命既雜者也天之監下也雜命焉耳遁草木之生則有生焉而无好惡循禽獸之生則有好惡焉而无禮義焉遁人之生則巍然知其好仁義也不遁其所以受命也遁之則得之矣是目之已故目萬物之生而獨有仁義也進耳文王在上於昭于天此之胃也文王源耳目之生而知其好聲色也源鼻口之生而知其好犫味也源手足之生而知其好勶餘也源心之生則巍然知其好仁義也故執之而弗失親之而弗離故卓然見於天箸於天下無它焉目也故目人𦡊而知其莫貴於仁義也進耳辟而知之胃之進之弗辟也辟則知之矣知之則進耳辟丘之與山也丘之所以不名山者不責也舜有仁我亦有仁而不如舜之仁不責也舜有義而我亦有義而不如舜之義不責積也辟比此之而知吾所以不如舜進耳榆而知之胃之進之弗榆也榆則知之矣知之則進耳榆之也者自所小好榆虖所大好茭芍淑女寤眜求之思色也求之弗得唔眜思伏言其急也䌛才䌛才婘槫反廁言其甚如此其甚也交諸父母之廁為諸則有死弗為之矣交諸兄弟之廁亦弗為也交諸邦人之廁亦弗為也畏父兄其殺畏人禮也䌛色榆於禮進耳鐖而知之天也鐖也者齎數也唯有天德者然苟鐖而知之上帝臨女毋潱壐心上帝臨女鐖之也毋潱壐心俱鐖之也天生諸无人天也天生諸其人也者如文王者也其人它者人也者如文王之它者弘夭散宜生也其人它者人不得其人不為法言所它之者不得如散宜生弘夭者也則弗為法矣聞君子道而說者好仁者也道也者天道也言好仁者之聞君子道而以之其仁也故能說說也者刑也聞君子道而威好義好義者也之聞君子道而以之其義也故能威威也者刑也聞道而共好禮者也言好禮者之聞君子道而以之其禮也故能共共者刑也聞道而樂有者也道也者天道也言好德者之聞君子道而以夫五也為一也故能樂樂也者和和者也
