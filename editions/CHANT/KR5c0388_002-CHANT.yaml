body:
  text: 馬王堆漢墓帛書老子甲本卷後古佚書九主湯用伊尹既放夏桀以君天下伊尹為三公天下大平湯乃自吾吾至伊尹乃是其能吾達伊尹伊尹見之於湯曰者侯時有讎罪過不在主干主之不明下𢅷上法亂常以危主者恒在臣請明臣法以繩適臣之罪湯曰非臣之罪也主不失道主法以繩適主之罪乃許伊尹伊尹受令於湯乃論𣳠內四邦圖智存亡若會符者得八主八主適惡剸授之君一勞君一寄一破邦之主二烕社之主二凡與法君為九主從古以來存者亡者此九已九主成圖請效之湯湯乃延三公伊尹布圖陳以明法君法臣法君者法天地之則者志曰天曰地曰四時復生萬物神聖是則以肥天地禮數四則曰天綸唯天不失乏四綸則古今四綸道數不代聖王是法法則明分后曰天乏何也伊尹對曰天乏无復生萬物生物不物莫不以名不可為二名此天乏也后曰大矣才大矣才不失乏法則明分何也伊尹對曰主法天佐法地輔臣法四時民法萬物此胃法則天復地載生長收臧分四時故曰事分在職臣是故受職臣分臣分也有民主分以无職并有職主分也敬誘分之胃明分分名暨定法君之佐佐主无聲胃天之命四則四則當天綸乃得得道之君邦出乎一道制命在主下不別黨邦无私門諍李皆塞后曰佐主无聲何也伊君對曰故法君為官求人弗自求也為官者不以忘予人故知臣者不敢誣能主不忘予以分名臣不以忘進曰以受也自者先名先名者自責夫先名者自之命已名命者符節也法君之所以也法君執符以故自之臣莫敢偽會以當其君佐者无扁職有分守也謂之命佐主之明并列百官之職者也是故法君執符以職則偽會不可主偽會不可主矣則賤不事貴袁不事近皆反其職信在忌心是故不出其身晝夕不離其職故法君之邦若无人非无人也皆居其職也賤不事貴袁不事則法君之佐何道別主之臣以為其黨空主之廷朝之其門所胃法君之佐佐主无聲者此之胃也后曰至矣才至矣才法君法臣木直繩弗能罪也木其能侵繩乎伊尹或請陳以明八適變過之所道生志曰唯天无勝凡物有勝后曰天无勝何也伊尹對曰勝者物所以備也所以得也天不見端故不可得原是无勝后曰極卜不見伊尹對曰故聖王天故曰主不法則乃反為物耑見必得得有巨才得主之才能用主邦有二道二道之邦長諍之李辨黨長爭无爭道得主者薨起大干天綸四則相侵主輕臣重邦多私門挾主與失詏可智以命破烕伊尹暨明八啇之所道生請命八啇法君明分詓臣分定以繩八啇八啇畢名過在主者四罪在臣者三臣主同罪者二后曰四主之罪何也伊尹對曰剸授失道之君也故得乎人非得人者也作人邦非用者也用乎人者也是得擅主之前用主之邦故制主之臣是故授失正之君也過在主雖然酉君也主吾則酉制其臣者也后曰於乎危才得主之才勞君者剸授之能吾者也吾於剸授主者也能吾不能反道自為其邦者主勞臣失為人君任臣之因主知倚事於君逆道也兇歸於主不君臣主侵君也未免於過在主唯然酉君也自制其臣者也非作人者烕社之主能用威法其臣其臣為一以其君恐懼而不敢盡是昔撝施伐叴民知之无所告朔是故同刑共共謀為一民自此王君所明號令无道處安其民故兵不用而邦舉兩主異過同罪烕社之主也過在上矣后曰差夏桀氏已夫三臣之罪何伊尹對曰剸授之臣擅主之前下𢅷上乘主之不吾以侵其君是故擅主之臣罪亦大矣半君者剸授而不悟者也是故擅主之臣見主之不吾故用其主嚴殺僇臣恐懼然后利主之臣成黨於下與主分權是故獲邦之半主亦獲其半則則危臣主橫危危之至是故半君之臣罪无后曰於乎危才半君寄主者半君之不吾者臣見主之不能則主寄矣是故或聞道而能吾吾正其橫臣者未聞寄主之能吾者也后曰哀才寄主臣主同罪何也伊尹對曰破邦之主剸授之不吾者也臣主同術為一以於民百姓絕望於上分倚父兄大臣此王君之所因以破邦也兩主異過同罪破邦之李也故曰臣主同罪法君明分法臣分定八啇畢名后曰九主之圖所胃守備搗具外內无寇者此之胃也后環擇吾見素乃三公以為葆守藏之重屋臣主始不相吾也
